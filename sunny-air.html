<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUNNY AIR - Premium IFE Moving Map</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>

    <style>
        :root {
            --night-blue: #0B1325;
            --aqua-blue: #48CAE4;
            --soft-gray: #A9B0C0;
            --white: #FFFFFF;
            --glass-bg: rgba(11, 19, 37, 0.85);
            --glass-border: rgba(72, 202, 228, 0.4);
            --alert-red: #FF4B4B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', 'Noto Sans KR', sans-serif; user-select: none; }
        body { background-color: var(--night-blue); color: var(--white); overflow: hidden; width: 100vw; height: 100vh; }

        /* Welcome Screen */
        #welcome-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #132242 0%, var(--night-blue) 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 1s ease-in-out, visibility 1s;
        }

        .airline-logo {
            position: absolute; top: 40px; left: 50px; font-size: 1.8rem; font-weight: 900; 
            color: var(--aqua-blue); letter-spacing: 4px; display: flex; align-items: center; gap: 10px;
        }
        .airline-logo svg { fill: var(--aqua-blue); width: 30px; height: 30px; }

        .welcome-title { font-size: 2.5rem; font-weight: 300; margin-bottom: 0.5rem; letter-spacing: 2px; }
        .welcome-subtitle { font-size: 1.2rem; color: var(--aqua-blue); margin-bottom: 3rem; letter-spacing: 5px; text-transform: uppercase; }

        .input-row { display: flex; gap: 30px; margin-bottom: 40px; }
        .input-group { display: flex; flex-direction: column; align-items: center; gap: 10px; position: relative; }
        .input-label { font-size: 0.9rem; color: var(--soft-gray); letter-spacing: 2px; }
        
        input[type="text"] {
            background: rgba(11, 19, 37, 0.5); border: 1px solid var(--glass-border); border-radius: 8px;
            padding: 15px 20px; font-size: 2rem; color: var(--white); text-align: center;
            width: 220px; text-transform: uppercase; backdrop-filter: blur(10px); outline: none; transition: border-color 0.3s;
        }
        input[type="text"]:focus { border-color: var(--aqua-blue); box-shadow: 0 0 15px rgba(72, 202, 228, 0.3); }
        
        /* Autocomplete */
        .autocomplete-list {
            position: absolute; top: 105%; left: 0; width: 100%; max-height: 200px; overflow-y: auto;
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 8px;
            z-index: 10000; display: none; text-align: left; backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .autocomplete-list::-webkit-scrollbar { width: 6px; }
        .autocomplete-list::-webkit-scrollbar-track { background: transparent; }
        .autocomplete-list::-webkit-scrollbar-thumb { background: var(--aqua-blue); border-radius: 3px; }
        .autocomplete-item { padding: 12px 15px; color: var(--white); cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; transition: background 0.2s; }
        .autocomplete-item:hover { background: rgba(72, 202, 228, 0.2); }
        .autocomplete-code { font-weight: 700; color: var(--aqua-blue); display: inline-block; width: 45px; }

        button.btn-start {
            background: var(--aqua-blue); color: var(--night-blue); border: none; border-radius: 30px;
            padding: 15px 60px; font-size: 1.2rem; font-weight: 700; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s; letter-spacing: 2px;
        }
        button.btn-start:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(72, 202, 228, 0.4); }

        /* IFE Layout */
        #ife-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; visibility: hidden; transition: opacity 1.5s ease-in-out; display: flex; flex-direction: column; }
        #map-wrapper { flex: 1; position: relative; overflow: hidden; }
        #map { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }

        /* Dashboard Overlay */
        #dashboard-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 19, 37, 0.85); backdrop-filter: blur(20px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; transition: opacity 1s ease-in-out; pointer-events: none;
        }

        .dash-page { position: absolute; display: flex; flex-wrap: wrap; justify-content: center; gap: 2rem; opacity: 0; transition: opacity 0.8s ease; visibility: hidden; }
        .dash-page.active { opacity: 1; visibility: visible; }
        .dash-card { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); border-radius: 16px; padding: 2rem; width: 320px; text-align: center; }
        .dash-title { color: var(--soft-gray); font-size: 1rem; letter-spacing: 2px; margin-bottom: 1rem; }
        .dash-title span.ko { display: block; font-size: 0.85rem; margin-top: 5px; color: var(--white); }
        .dash-value-container { position: relative; height: 60px; overflow: hidden; }
        .dash-val-group { position: absolute; width: 100%; top: 0; left: 0; display: flex; align-items: baseline; justify-content: center; gap: 5px; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s; }
        .val-imperial { transform: translateY(0); opacity: 1; }
        .val-metric { transform: translateY(60px); opacity: 0; }
        .show-metric .val-imperial { transform: translateY(-60px); opacity: 0; }
        .show-metric .val-metric { transform: translateY(0); opacity: 1; }
        .dash-num { font-size: 3.5rem; font-weight: 300; color: var(--aqua-blue); font-variant-numeric: tabular-nums; }
        .dash-unit { font-size: 1.2rem; color: var(--white); }
        .dash-time-num { font-size: 4rem; font-weight: 700; color: var(--aqua-blue); letter-spacing: 2px; font-variant-numeric: tabular-nums;}

        /* Speed Control */
        #speed-controls {
            position: absolute; right: 40px; bottom: 110px; z-index: 1002;
            display: flex; gap: 10px; background: rgba(11, 19, 37, 0.7); padding: 10px;
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
        }
        .speed-btn { background: transparent; color: var(--soft-gray); border: 1px solid transparent; padding: 8px 16px; border-radius: 20px; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .speed-btn:hover { color: var(--white); }
        .speed-btn.active { background: var(--aqua-blue); color: var(--night-blue); }

        /* Progress Bar */
        #progress-container {
            height: 90px; background: rgba(11, 19, 37, 0.85); backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.1); display: flex; align-items: center; padding: 0 40px; z-index: 1001;
        }
        .flight-node { width: 250px; display: flex; flex-direction: column; justify-content: center; position: relative; height: 100%; }
        .node-right { align-items: flex-end; text-align: right; }
        
        .node-dynamic-text { 
            font-size: 1.6rem; font-weight: 700; color: var(--white); letter-spacing: 1px;
            transition: opacity 0.6s ease-in-out; opacity: 0; text-transform: uppercase; white-space: nowrap;
        }

        .progress-track { flex: 1; height: 4px; background: rgba(255, 255, 255, 0.2); margin: 0 30px; position: relative; border-radius: 2px; }
        .progress-fill { position: absolute; top: 0; left: 0; height: 100%; background: var(--aqua-blue); width: 0%; box-shadow: 0 0 10px var(--aqua-blue); }
        .progress-plane { position: absolute; top: -14px; left: 0%; width: 32px; height: 32px; transform: translateX(-50%) rotate(90deg); fill: var(--white); transition: left 0.1s linear;}
        .eta-block { margin-left: 30px; padding-left: 30px; border-left: 1px solid rgba(255,255,255,0.2); display: flex; flex-direction: column; align-items: flex-end; width: 140px;}
        .eta-label { font-size: 0.8rem; color: var(--soft-gray); letter-spacing: 1px; margin-bottom: 5px; }
        .eta-value { font-size: 1.8rem; font-weight: 700; color: var(--aqua-blue); font-variant-numeric: tabular-nums; }

        /* Map Markers */
        .leaflet-container { background: var(--night-blue); }
        .custom-plane-icon svg { filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.8)); transition: transform 0.1s linear; }
        .city-label { color: var(--white); font-size: 0.8rem; text-shadow: 1px 1px 4px #000, -1px -1px 4px #000; font-weight: 400; text-align: center; white-space: nowrap; }
        .city-label-t1 { font-size: 1.15rem; color: var(--aqua-blue); font-weight: 700; text-shadow: 2px 2px 5px #000; }
        .city-label-t2 { font-size: 0.95rem; color: #FFF; font-weight: 600; }
        .end-point-marker { color: var(--aqua-blue); font-size: 1.2rem; font-weight: 700; text-shadow: 0 0 10px #000; display: flex; flex-direction: column; align-items: center; }
        .end-point-icon { font-size: 1.5rem; line-height: 1; margin-bottom: 2px; }

        #toast {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: rgba(255, 75, 75, 0.95); border: 1px solid var(--alert-red); color: white;
            padding: 15px 30px; border-radius: 30px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 2000; opacity: 0; transition: all 0.5s; font-weight: 500; font-size: 1.1rem;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="airline-logo">
            <svg viewBox="0 0 24 24"><path d="M21,16V14L13,9V3.5A1.5,1.5 0 0,0 11.5,2A1.5,1.5 0 0,0 10,3.5V9L2,14V16L10,13.5V19L8,20.5V22L11.5,21L15,22V20.5L13,19V13.5L21,16Z"/></svg>
            SUNNY AIR
        </div>
        <h1 class="welcome-title">탑승을 환영합니다</h1>
        <div class="welcome-subtitle">Welcome Aboard</div>
        <div class="input-row">
            <div class="input-group">
                <span class="input-label">ORIGIN / 출발지</span>
                <input type="text" id="input-origin" placeholder="IATA" maxlength="3" value="" autocomplete="off">
                <div class="autocomplete-list" id="auto-origin"></div>
            </div>
            <div class="input-group">
                <span class="input-label">DESTINATION / 목적지</span>
                <input type="text" id="input-dest" placeholder="IATA" maxlength="3" value="" autocomplete="off">
                <div class="autocomplete-list" id="auto-dest"></div>
            </div>
        </div>
        <button class="btn-start" onclick="startSystem()">ENTER / 확인</button>
    </div>

    <div id="ife-container">
        <div id="map-wrapper">
            <div id="map"></div>
            <div id="dashboard-overlay">
                <div class="dash-page active" id="dash-page-1">
                    <div class="dash-card">
                        <div class="dash-title">ALTITUDE <span class="ko">현재 고도</span></div>
                        <div class="dash-value-container" id="unit-group-alt">
                            <div class="dash-val-group val-imperial"><span class="dash-num" id="alt-ft">0</span><span class="dash-unit">ft</span></div>
                            <div class="dash-val-group val-metric"><span class="dash-num" id="alt-m">0</span><span class="dash-unit">m</span></div>
                        </div>
                    </div>
                    <div class="dash-card">
                        <div class="dash-title">GROUND SPEED <span class="ko">대지 속도</span></div>
                        <div class="dash-value-container" id="unit-group-spd">
                            <div class="dash-val-group val-imperial"><span class="dash-num" id="spd-kts">0</span><span class="dash-unit">kts</span></div>
                            <div class="dash-val-group val-metric"><span class="dash-num" id="spd-kmh">0</span><span class="dash-unit">km/h</span></div>
                        </div>
                    </div>
                    <div class="dash-card">
                        <div class="dash-title">DISTANCE TO GO <span class="ko">남은 거리</span></div>
                        <div class="dash-value-container" id="unit-group-dist">
                            <div class="dash-val-group val-imperial"><span class="dash-num" id="dist-nm">0</span><span class="dash-unit">nm</span></div>
                            <div class="dash-val-group val-metric"><span class="dash-num" id="dist-km">0</span><span class="dash-unit">km</span></div>
                        </div>
                    </div>
                </div>
                <div class="dash-page" id="dash-page-2">
                    <div class="dash-card">
                        <div class="dash-title">ORIGIN TIME <span class="ko">출발지 현지 시간</span></div>
                        <div class="dash-time-num" id="time-origin">--:--</div>
                    </div>
                    <div class="dash-card">
                        <div class="dash-title">TIME TO DESTINATION <span class="ko">도착 잔여 시간</span></div>
                        <div class="dash-time-num" id="time-remain-big" style="color: var(--white);">--:--</div>
                    </div>
                    <div class="dash-card">
                        <div class="dash-title">DESTINATION TIME <span class="ko">목적지 현지 시간</span></div>
                        <div class="dash-time-num" id="time-dest">--:--</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="speed-controls">
            <button class="speed-btn active" onclick="setSpeed(1, this)">1x</button>
            <button class="speed-btn" onclick="setSpeed(30, this)">30x</button>
            <button class="speed-btn" onclick="setSpeed(60, this)">60x</button>
            <button class="speed-btn" onclick="setSpeed(120, this)">120x</button>
        </div>

        <div id="progress-container">
            <div class="flight-node">
                <div class="node-dynamic-text" id="node-origin-text" style="opacity: 1;">---</div>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="prog-fill"></div>
                <svg class="progress-plane" id="prog-plane" viewBox="0 0 24 24">
                    <path d="M21,16V14L13,9V3.5A1.5,1.5 0 0,0 11.5,2A1.5,1.5 0 0,0 10,3.5V9L2,14V16L10,13.5V19L8,20.5V22L11.5,21L15,22V20.5L13,19V13.5L21,16Z" />
                </svg>
            </div>
            <div class="flight-node node-right">
                <div class="node-dynamic-text" id="node-dest-text" style="opacity: 1;">---</div>
            </div>
            <div class="eta-block">
                <div class="eta-label">TIME TO DEST</div>
                <div class="eta-value" id="time-remain-small">00:00</div>
            </div>
        </div>
    </div>

    <div id="toast">IATA 코드를 확인해 주세요.</div>

        // --- 자동완성 (Autocomplete) 로직 ---
        function setupAutocomplete(inputId, listId) {
            const input = document.getElementById(inputId);
            const list = document.getElementById(listId);

            input.addEventListener('input', function() {
                const val = this.value.toUpperCase();
                list.innerHTML = '';
                if (!val) { list.style.display = 'none'; return; }

                // 한국어, 영문 모두 검색
                const matches = Object.keys(AIRPORTS).filter(code => 
                    code.includes(val) || AIRPORTS[code].n.toUpperCase().includes(val)
                );
                
                if (matches.length > 0) {
                    list.style.display = 'block';
                    matches.slice(0, 30).forEach(code => {
                        const div = document.createElement('div');
                        div.className = 'autocomplete-item';
                        // 표시할 때 분리해서 예쁘게
                        const names = AIRPORTS[code].n.split('/');
                        const dispName = names[0] + (names[1] ? ` / ${names[1]}` : '');
                        div.innerHTML = `<span class="autocomplete-code">${code}</span> ${dispName}`;
                        div.onclick = function() {
                            input.value = code;
                            list.style.display = 'none';
                        };
                        list.appendChild(div);
                    });
                } else {
                    list.style.display = 'none';
                }
            });

            input.addEventListener('focus', function() { if(this.value) { this.dispatchEvent(new Event('input')); } });
            document.addEventListener('click', function(e) { if (e.target !== input && e.target !== list) list.style.display = 'none'; });
        }
        setupAutocomplete('input-origin', 'auto-origin');
        setupAutocomplete('input-dest', 'auto-dest');

        let flightData = { org: null, dst: null, path: [], totalDist: 0, progress: 0, alt: 0, speed: 0, cruiseAlt: 35000, cruiseSpeed: 480 };

        let renderFrameId, simTimeSec = 0, totalFlightTimeSec = 0, simMultiplier = 1, lastRealTime = 0, flightStartTime = new Date(); 
        
        let displayStep = 0;

        function showToast(msg) {
            const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function startSystem() {
            const oCode = document.getElementById('input-origin').value.trim().toUpperCase();
            const dCode = document.getElementById('input-dest').value.trim().toUpperCase();

            if (!AIRPORTS[oCode]) return showToast(`출발지 코드 '${oCode}'를 찾을 수 없습니다.`);
            if (!AIRPORTS[dCode]) return showToast(`목적지 코드 '${dCode}'를 찾을 수 없습니다.`);
            if (oCode === dCode) return showToast('출발지와 목적지가 같습니다.');

            flightData.org = AIRPORTS[oCode]; flightData.org.code = oCode;
            flightData.dst = AIRPORTS[dCode]; flightData.dst.code = dCode;

            document.getElementById('welcome-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('welcome-screen').style.visibility = 'hidden', 1000);
            
            const ife = document.getElementById('ife-container');
            ife.style.visibility = 'visible';
            setTimeout(() => ife.style.opacity = '1', 500);

            initFlightPath(); initUI(); initMap();
            
            lastRealTime = performance.now();
            startSimulation(); startDisplaySequence();

        function setSpeed(mult, btn) {
            simMultiplier = mult;
            document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function initFlightPath() {
            const p1 = flightData.org, p2 = flightData.dst;
            flightData.path = [];
            let lng2 = p2.lng;
            if (Math.abs(lng2 - p1.lng) > 180) lng2 += (p2.lng < p1.lng) ? 360 : -360;

            for(let i=0; i<=300; i++) {
                let t = i / 300;
                let lat = p1.lat + (p2.lat - p1.lat) * t;
                let arc = Math.sin(t * Math.PI) * (Math.abs(lng2 - p1.lng) * 0.2); 
                lat += (p1.lat > 0) ? arc : -arc;
                let lng = p1.lng + (lng2 - p1.lng) * t;
                flightData.path.push({lat, lng});
            }
            
            const R = 3440.065;
            const dLat = (p2.lat - p1.lat) * Math.PI / 180, dLon = (lng2 - p1.lng) * Math.PI / 180;
            const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(p1.lat*Math.PI/180)*Math.cos(p2.lat*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            flightData.totalDist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            if (flightData.totalDist < 500) { flightData.cruiseAlt = 28000; flightData.cruiseSpeed = 420; } 
            else if (flightData.totalDist < 1500) { flightData.cruiseAlt = 35000; flightData.cruiseSpeed = 460; } 
            else { flightData.cruiseAlt = 39000; flightData.cruiseSpeed = 500; }
            totalFlightTimeSec = (flightData.totalDist / flightData.cruiseSpeed) * 3600;
        }

        function updateBottomText() {
            const oNames = flightData.org.n.split('/');
            const dNames = flightData.dst.n.split('/');
            const oKo = oNames[0]; const oEn = oNames[1] || oNames[0];
            const dKo = dNames[0]; const dEn = dNames[1] || dNames[0];

            let oTxt, dTxt;
            if (displayStepBottom === 0) {
                oTxt = flightData.org.code; dTxt = flightData.dst.code;
            } else if (displayStepBottom === 1) {
                oTxt = oEn; dTxt = dEn;
            } else {

        function initUI() {

        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false, dragging: false, scrollWheelZoom: false, doubleClickZoom: false })
                  .setView([flightData.org.lat, flightData.org.lng], 4);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

            const createPoint = (pos, txt) => {
                L.marker([pos.lat, pos.lng], {
                    icon: L.divIcon({ html: `<div class="end-point-marker"><div class="end-point-icon">◈</div><div>${txt}</div></div>`, className: '', iconSize: [100, 60], iconAnchor: [50, 20] })
                }).addTo(map);
            };
            createPoint(flightData.path[0], flightData.org.code);
            createPoint(flightData.path[flightData.path.length-1], flightData.dst.code);

            pastPolyline = L.polyline([], { color: '#48CAE4', weight: 3, opacity: 0.9 }).addTo(map);
            futurePolyline = L.polyline(flightData.path, { color: '#A9B0C0', weight: 2, dashArray: '10, 15', opacity: 0.5 }).addTo(map);

            const planeSvg = `<svg viewBox="0 0 24 24" width="64" height="64"><path fill="#48CAE4" stroke="#FFFFFF" stroke-width="0.5" d="M21,16V14L13,9V3.5A1.5,1.5 0 0,0 11.5,2A1.5,1.5 0 0,0 10,3.5V9L2,14V16L10,13.5V19L8,20.5V22L11.5,21L15,22V20.5L13,19V13.5L21,16Z" /></svg>`;
            planeMarker = L.marker([flightData.org.lat, flightData.org.lng], {
                icon: L.divIcon({ html: `<div id="plane-icon-wrapper" class="custom-plane-icon">${planeSvg}</div>`, className: '', iconSize: [64, 64], iconAnchor: [32, 32] }),
                zIndexOffset: 1000
            }).addTo(map);

            map.on('moveend', renderCities);
        }

        function renderCities() {
            cityMarkers.forEach(m => map.removeLayer(m));
            cityMarkers = [];
            const zoom = map.getZoom();
            
            let allowedTier = (zoom >= 7) ? 3 : (zoom >= 5) ? 2 : 1;
            const bounds = map.getBounds();
            
            // 도시 표시량 대폭 증가 (최대 200개 쾌적 렌더링)
            let visible = CITIES.filter(c => c.t <= allowedTier && bounds.contains([c.lat, c.lng])).slice(0, 200);
            
            visible.forEach(c => {
                let cssClass = 'city-label';
                if(c.t === 1) cssClass += ' city-label-t1';
                else if(c.t === 2) cssClass += ' city-label-t2';
                
                const m = L.marker([c.lat, c.lng], {
                    icon: L.divIcon({ html: `<div class="${cssClass}">•<br>${c.n}</div>`, className: '', iconSize: [120, 40], iconAnchor: [60, 10] })
                }).addTo(map);
                cityMarkers.push(m);
            });
        }

        function startSimulation() {
            function update(now) {
                const dt = (now - lastRealTime) / 1000;
                lastRealTime = now;
                simTimeSec += dt * simMultiplier;

                const T = totalFlightTimeSec;
                flightData.progress = Math.min(1, Math.max(0, simTimeSec / T));
                const remainSec = Math.max(0, T - simTimeSec);

                const t1 = Math.min(120, T * 0.05);          
                const t2 = Math.min(1800, T * 0.25);         
                const t4 = Math.max(T - 180, T * 0.95);      
                const t3 = Math.max(T - 1800, T * 0.75);     

                let baseAlt = 0, baseSpeed = 0;

                // 5단계 비행 프로파일 베이스
                if (simTimeSec < t1) {
                    const ratio = simTimeSec / t1;
                    baseAlt = ratio * 3000; baseSpeed = ratio * 180;
                } else if (simTimeSec < t2) {
                    const ratio = (simTimeSec - t1) / (t2 - t1);
                    const easeOut = 1 - Math.pow(1 - ratio, 2);
                    baseAlt = 3000 + easeOut * (flightData.cruiseAlt - 3000);
                    baseSpeed = 180 + ratio * (flightData.cruiseSpeed - 180);
                } else if (simTimeSec < t3) {
                    baseAlt = flightData.cruiseAlt; baseSpeed = flightData.cruiseSpeed;
                } else if (simTimeSec < t4) {
                    const ratio = (simTimeSec - t3) / (t4 - t3);
                    baseAlt = flightData.cruiseAlt - ratio * (flightData.cruiseAlt - 3000);
                    baseSpeed = flightData.cruiseSpeed - ratio * (flightData.cruiseSpeed - 180);
                } else {
                    const ratio = (simTimeSec - t4) / (T - t4);
                    baseAlt = 3000 - ratio * 3000; baseSpeed = 180 - ratio * 180;
                }

                // [가상 바람 효과 (Wind Effect)] - 삼각함수 조합으로 제트기류 변동 시뮬레이션
                // 고도가 높고 속도가 빠를수록 바람 영향을 많이 받도록 설계
                const windNoise = Math.sin(simTimeSec / 6) * 6 + Math.cos(simTimeSec / 15) * 8 + Math.sin(simTimeSec / 33) * 12;
                const speedScale = baseSpeed / flightData.cruiseSpeed; 
                const simulatedSpeed = baseSpeed + (windNoise * speedScale); // 최대 +/- 26 kts 변동

                flightData.alt = Math.max(0, baseAlt);
                flightData.speed = Math.max(0, simulatedSpeed);

                const totalPoints = flightData.path.length - 1;
                const exactIdx = flightData.progress * totalPoints;
                const i = Math.min(Math.floor(exactIdx), totalPoints - 1);
                
                const p1 = flightData.path[i], p2 = flightData.path[i+1];
                const t = exactIdx - i;
                const curLat = p1.lat + (p2.lat - p1.lat) * t;
                const curLng = p1.lng + (p2.lng - p1.lng) * t;
                
                let heading = Math.atan2(p2.lng - p1.lng, p2.lat - p1.lat) * 180 / Math.PI;
                if(heading < 0) heading += 360;

                planeMarker.setLatLng([curLat, curLng]);
                pastPolyline.setLatLngs(flightData.path.slice(0, i+1).concat([{lat: curLat, lng: curLng}]));
                futurePolyline.setLatLngs([{lat: curLat, lng: curLng}].concat(flightData.path.slice(i+1)));

                document.getElementById('plane-icon-wrapper').style.transform = `rotate(${heading}deg)`;
                map.setView([curLat, curLng], map.getZoom(), {animate: false});

                const pct = flightData.progress * 100;
                document.getElementById('prog-fill').style.width = `${pct}%`;
                document.getElementById('prog-plane').style.left = `${pct}%`;

                const hrs = Math.floor(remainSec / 3600);
                const mins = Math.floor((remainSec % 3600) / 60);
                const etaStr = `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}`;
                document.getElementById('time-remain-small').innerText = etaStr;
                document.getElementById('time-remain-big').innerText = etaStr;

                updateDashboardNumbers();
                if (flightData.progress < 1) renderFrameId = requestAnimationFrame(update);
            }
            renderFrameId = requestAnimationFrame(update);
        }

        function startDisplaySequence() {
            applySequence();
            setInterval(() => {
                displayStep = (displayStep + 1) % 6;
                applySequence();
            }, 10000); 
        }

        function applySequence() {
            const dash = document.getElementById('dashboard-overlay');
            const p1 = document.getElementById('dash-page-1');
            const p2 = document.getElementById('dash-page-2');
            const groups = [document.getElementById('unit-group-alt'), document.getElementById('unit-group-spd'), document.getElementById('unit-group-dist')];

            dash.style.opacity = '0'; p1.classList.remove('active'); p2.classList.remove('active');
            groups.forEach(g => g.classList.remove('show-metric'));

            switch (displayStep) {
                case 0: map.setZoom(3); break; 
                case 1: map.setZoom(5); break; 
                case 2: map.setZoom(7); break; 
                case 3: 
                    map.setZoom(5); dash.style.opacity = '1'; p1.classList.add('active'); break;
                case 4: 
                    map.setZoom(5); dash.style.opacity = '1'; p1.classList.add('active'); groups.forEach(g => g.classList.add('show-metric')); break;
                case 5: 
                    map.setZoom(5); dash.style.opacity = '1'; p2.classList.add('active'); break;
            }
        }

        function updateDashboardNumbers() {
            const distToGo = flightData.totalDist * (1 - flightData.progress);
            
            document.getElementById('alt-ft').innerText = Math.round(flightData.alt).toLocaleString();
            document.getElementById('spd-kts').innerText = Math.round(flightData.speed);
            document.getElementById('dist-nm').innerText = Math.round(distToGo).toLocaleString();
            
            document.getElementById('alt-m').innerText = Math.round(flightData.alt * 0.3048).toLocaleString();
            document.getElementById('spd-kmh').innerText = Math.round(flightData.speed * 1.852);
            document.getElementById('dist-km').innerText = Math.round(distToGo * 1.852).toLocaleString();

            const opts = { hour: '2-digit', minute: '2-digit', hour12: false };
            const simTime = new Date(flightStartTime.getTime() + (simTimeSec * 1000));
            document.getElementById('time-origin').innerText = simTime.toLocaleTimeString('en-US', opts);
            
            const tzOffset = Math.round((flightData.dst.lng - flightData.org.lng) / 15);
            const destTime = new Date(simTime.getTime() + (tzOffset * 3600000));
            document.getElementById('time-dest').innerText = destTime.toLocaleTimeString('en-US', opts);
        }

    </script>
</body>
